version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gtm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: github_time_machine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gtm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/github_time_machine
      REPO_CLONE_DIR: /tmp/repos
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      # Paste your keys here OR use a .env file
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - ./backend:/app          # hot-reload in dev
      - repo_clones:/tmp/repos  # persisted clone cache
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gtm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: /api/v1

  # ── pgAdmin (optional dev tool) ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gtm_pgadmin
    restart: unless-stopped
    profiles: ["dev"]     # only starts with: docker compose --profile dev up
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gtm.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  repo_clones:
